<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Паттерны и Архитектуры</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Десктопная версия (от 601px и выше) -->
  <link
    rel="stylesheet"
    href="style.css"
    media="screen and (min-width: 601px)"
  />

  <!-- Мобильная версия (до 600px) -->
  <link
    rel="stylesheet"
    href="mobile.css"
    media="screen and (max-width: 600px)"
  />

  
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <div class="logo-section">
        <h1>🔍 Поиск:</h1>
      </div>
      <div class="search-section">
        <input
          id="search-box"
          type="text"
          placeholder="Введите ключевые слова..."
        />
        <button id="toggle-themes" class="toggle-btn">Скрыть</button>
      </div>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <div class="sidebar-content">
        <nav id="categories-nav">
          <ul>
            <!-- Категории будут добавлены динамически -->
          </ul>
        </nav>
      </div>
      
    </aside>

    <main id="content" class="content-area">
      <!-- Таблицы будут добавлены динамически -->
    </main>
  </div>
</body>
<script type="module" defer src="./main.js"></script>
</html>
